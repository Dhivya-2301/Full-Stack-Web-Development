<!DOCTYPE html>
<html>
<head>
    <title>Real-Time Validation</title>

    <style>
        body {
            background: linear-gradient(to right, #ffd6e8, #ffe6f2);
            font-family: Arial, sans-serif;
        }

        .container {
            width: 350px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
        }

        input {
            width: 95%;
            padding: 8px;
            margin: 8px 0;
            border: 1px solid gray;
            border-radius: 5px;
        }

        input.error-border {
            border: 2px solid red;
        }

        input.success-border {
            border: 2px solid green;
        }

        .error {
            color: red;
            font-size: 13px;
            margin: 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: hotpink;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: deeppink;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Registration Form</h2>

    <form>

        <input type="text" id="name" placeholder="Enter Name">
        <p id="nameError" class="error"></p>

        <input type="text" id="email" placeholder="Enter Email">
        <p id="emailError" class="error"></p>

        <input type="text" id="phone" placeholder="Enter Phone Number">
        <p id="phoneError" class="error"></p>

        <input type="password" id="password" placeholder="Enter Password">
        <p id="passwordError" class="error"></p>

        <button type="submit">Submit</button>

    </form>
</div>

<script>

document.getElementById("name").addEventListener("input", function() {
    let name = this.value;
    let error = document.getElementById("nameError");

    if (name === "") {
        error.innerHTML = "Name cannot be empty";
        this.classList.add("error-border");
        this.classList.remove("success-border");
    } else {
        error.innerHTML = "";
        this.classList.remove("error-border");
        this.classList.add("success-border");
    }
});

document.getElementById("email").addEventListener("input", function() {
    let email = this.value;
    let error = document.getElementById("emailError");
    let pattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

    if (!email.match(pattern)) {
        error.innerHTML = "Enter valid email";
        this.classList.add("error-border");
        this.classList.remove("success-border");
    } else {
        error.innerHTML = "";
        this.classList.remove("error-border");
        this.classList.add("success-border");
    }
});

document.getElementById("phone").addEventListener("input", function() {
    let phone = this.value;
    let error = document.getElementById("phoneError");
    let pattern = /^[0-9]{10}$/;

    if (!phone.match(pattern)) {
        error.innerHTML = "Phone must be 10 digits";
        this.classList.add("error-border");
        this.classList.remove("success-border");
    } else {
        error.innerHTML = "";
        this.classList.remove("error-border");
        this.classList.add("success-border");
    }
});

document.getElementById("password").addEventListener("input", function() {
    let password = this.value;
    let error = document.getElementById("passwordError");

    if (password.length < 6) {
        error.innerHTML = "Minimum 6 characters required";
        this.classList.add("error-border");
        this.classList.remove("success-border");
    } else {
        error.innerHTML = "";
        this.classList.remove("error-border");
        this.classList.add("success-border");
    }
});

</script>

</body>
</html>
